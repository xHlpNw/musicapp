<div
  class="add-track-overlay"
  [class.add-track-overlay--open]="isAnimated"
  (click)="onBackdropClick($event)"
  role="dialog"
  aria-labelledby="add-track-title"
  aria-modal="true"
  tabindex="-1"
  *ngIf="isOpen"
>
  <div class="add-track-overlay__panel" (click)="onPanelClick($event)">
    <header class="add-track-overlay__header">
      <h2 id="add-track-title" class="add-track-overlay__title">
        Добавить трек в альбом «{{ data?.albumTitle }}»
      </h2>
      <button type="button" class="add-track-overlay__close" aria-label="Закрыть" (click)="doClose()" [disabled]="isLoading">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </header>

    <div class="add-track-overlay__content">
      <div *ngIf="errorMessage" class="alert-error">{{ errorMessage }}</div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="add-track-overlay__form">
        <div class="form-group">
          <label for="track-file">Аудиофайл *</label>
          <input type="file" id="track-file" accept="audio/*" (change)="onFileSelected($event)" />
          <span class="hint" *ngIf="selectedFile">{{ selectedFile.name }}</span>
        </div>

        <div class="form-group">
          <label for="track-title">Название трека *</label>
          <input
            type="text"
            id="track-title"
            formControlName="title"
            [class.error]="title?.invalid && title?.touched"
            placeholder="Название"
          />
          <span class="error-message" *ngIf="title?.invalid && title?.touched">Обязательно</span>
        </div>

        <div class="form-group form-group--wide">
          <label>Исполнители</label>
          <p class="hint">Порядок строк — как в треке. Можно назначить любое количество основных (PRIMARY) и приглашённых (FEATURED).</p>
          <div class="participants">
            <div class="participant-row" *ngFor="let row of participants; let i = index">
              <span class="participant-order">{{ i + 1 }}.</span>
              <select
                [(ngModel)]="row.artistId"
                [ngModelOptions]="{ standalone: true }"
              >
                <option [ngValue]="null">—</option>
                <option *ngFor="let a of artistsCatalog" [ngValue]="a.id">{{ a.name }}</option>
              </select>
              <select
                [(ngModel)]="row.role"
                [ngModelOptions]="{ standalone: true }"
                (ngModelChange)="onParticipantRoleChange(row)"
                class="participant-role"
              >
                <option value="PRIMARY">Основной</option>
                <option value="FEATURED">Приглашённый</option>
              </select>
              <div class="participant-actions">
                <button type="button" class="btn-icon" (click)="moveParticipantUp(i)" [disabled]="i === 0">↑</button>
                <button
                  type="button"
                  class="btn-icon"
                  (click)="moveParticipantDown(i)"
                  [disabled]="i === participants.length - 1"
                >
                  ↓
                </button>
                <button
                  type="button"
                  class="btn-icon btn-icon--danger"
                  (click)="removeParticipant(i)"
                  [disabled]="participants.length <= 1"
                >
                  ×
                </button>
              </div>
            </div>
          </div>
          <button type="button" class="btn-add-participant" (click)="addParticipant()" title="Добавить исполнителя">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 3.33331V12.6666" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3.33301 8H12.6663" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Добавить исполнителя</span>
          </button>
          <span *ngIf="isLoadingArtists" class="hint">Загрузка списка...</span>
        </div>

        <div class="form-row">
          <div class="form-group form-group--compact">
            <label for="track-position">Номер *</label>
            <input type="number" id="track-position" formControlName="position" min="1" />
          </div>

          <div class="form-group form-group--compact">
            <label for="track-duration">Длительность (сек) *</label>
            <input
              id="track-duration"
              type="number"
              formControlName="durationSeconds"
              min="1"
              [class.error]="durationSeconds?.invalid && durationSeconds?.touched"
            />
            <span class="hint">Заполняется автоматически при выборе файла.</span>
          </div>
        </div>

        <div class="add-track-overlay__actions">
          <button type="submit" class="btn btn-primary" [disabled]="!canSubmit()">
            {{ isLoading ? 'Загрузка...' : 'Добавить трек' }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="doClose()" [disabled]="isLoading">
            Отмена
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

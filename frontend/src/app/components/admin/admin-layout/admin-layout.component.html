<app-header [(searchValue)]="searchQuery" [searchReadonly]="true" />

<div class="page-layout">
  <app-side-nav />

  <div class="page-content">
    <main class="main">
      <section class="admin-section">
        <h1 class="admin-page-title">Админ-панель</h1>
        <nav class="admin-tabs" role="tablist">
          <a routerLink="/admin/artists" routerLinkActive="admin-tabs__tab--active" [routerLinkActiveOptions]="{ exact: false }" class="admin-tabs__tab" role="tab">Артисты</a>
          <a routerLink="/admin/albums" routerLinkActive="admin-tabs__tab--active" [routerLinkActiveOptions]="{ exact: false }" class="admin-tabs__tab" role="tab">Альбомы</a>
          <a routerLink="/admin/tracks" routerLinkActive="admin-tabs__tab--active" [routerLinkActiveOptions]="{ exact: false }" class="admin-tabs__tab" role="tab">Треки</a>
        </nav>
        <div class="admin-tab-content">
          <router-outlet></router-outlet>
        </div>
      </section>
    </main>
  </div>
</div>

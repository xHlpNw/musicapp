<div class="admin-card">
  <div class="admin-card-header">
    <h1>Редактировать трек</h1>
    <a routerLink="/admin/tracks" class="btn btn-secondary">Назад к списку</a>
  </div>

  <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="participants.length">
    <div class="form-group">
      <label for="title">Название *</label>
      <input id="title" formControlName="title" [class.error]="title?.invalid && title?.touched" />
    </div>

    <div class="form-group form-group--wide">
      <label>Исполнители</label>
      <p class="hint">Порядок строк — порядок в треке. Один основной (PRIMARY), остальные — приглашённые.</p>
      <div class="participants">
        <div class="participant-row" *ngFor="let row of participants; let i = index">
          <span class="participant-order">{{ i + 1 }}.</span>
          <select
            [(ngModel)]="row.artistId"
            [ngModelOptions]="{ standalone: true }"
            (ngModelChange)="onParticipantArtistChange()"
          >
            <option [ngValue]="null">—</option>
            <option *ngFor="let a of artistsCatalog" [ngValue]="a.id">{{ a.name }}</option>
          </select>
          <select
            [(ngModel)]="row.role"
            [ngModelOptions]="{ standalone: true }"
            (ngModelChange)="onParticipantRoleChange(row)"
            class="participant-role"
          >
            <option value="PRIMARY">Основной</option>
            <option value="FEATURED">Приглашённый</option>
          </select>
          <div class="participant-actions">
            <button type="button" class="btn-icon" (click)="moveParticipantUp(i)" [disabled]="i === 0">↑</button>
            <button
              type="button"
              class="btn-icon"
              (click)="moveParticipantDown(i)"
              [disabled]="i === participants.length - 1"
            >
              ↓
            </button>
            <button
              type="button"
              class="btn-icon btn-icon--danger"
              (click)="removeParticipant(i)"
              [disabled]="participants.length <= 1"
            >
              ×
            </button>
          </div>
        </div>
      </div>
      <button type="button" class="btn btn-secondary btn-small" (click)="addParticipant()">+ Исполнитель</button>
      <div class="new-artist-block">
        <span class="hint">Новый исполнитель в базе:</span>
        <div class="new-artist-row">
          <input
            type="text"
            [(ngModel)]="newArtistName"
            [ngModelOptions]="{ standalone: true }"
            placeholder="Имя"
            (keyup.enter)="createNewArtist()"
          />
          <button type="button" class="btn btn-secondary btn-small" (click)="createNewArtist()" [disabled]="creatingArtist">
            {{ creatingArtist ? '…' : 'Создать' }}
          </button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="albumId">Альбом *</label>
      <select id="albumId" formControlName="albumId">
        <option *ngFor="let al of albums" [ngValue]="al.id">{{ al.title }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="position">Номер в альбоме *</label>
      <input type="number" id="position" formControlName="position" min="1" />
    </div>

    <div class="form-group">
      <label for="durationSeconds">Длительность (сек) *</label>
      <input type="number" id="durationSeconds" formControlName="durationSeconds" min="1" />
    </div>

    <div class="form-group">
      <label for="audioFile">Новый аудиофайл</label>
      <input type="file" id="audioFile" accept="audio/*" (change)="onAudioFileSelected($event)" />
      <span class="hint" *ngIf="selectedAudioFile">{{ selectedAudioFile.name }}</span>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="isLoading || !trackId">Сохранить</button>
      <a routerLink="/admin/tracks" class="btn btn-secondary">Отмена</a>
    </div>
  </form>
</div>

<audio #audioEl
  [src]="streamUrlSafe$ | async"
  (timeupdate)="onTimeUpdate()"
  (loadedmetadata)="onLoadedMetadata()"
  (canplay)="onCanPlay()"
  (play)="onPlay()"
  (pause)="onPause()"
  (ended)="onEnded()">
</audio>

<div class="player" *ngIf="currentTrack$ | async as track">
  <div class="player__left">
    <div class="player__cover" [style.background-image]="getCoverStyle(track)"></div>
    <div class="player__info">
      <span class="player__title">{{ track.title }}</span>
      <span class="player__artist">{{ getArtistNames(track) }}</span>
    </div>
  </div>

  <div class="player__center">
    <div class="player__progress-wrap">
      <span class="player__time">{{ formatDuration(currentTime) }}</span>
      <div class="player__progress" (click)="onProgressClick($event)">
        <div class="player__progress-filled" [style.width.%]="progressPercent"></div>
        <span class="player__progress-handle" [style.left.%]="progressPercent" aria-hidden="true"></span>
      </div>
      <span class="player__time">{{ formatDuration(duration || track.durationSeconds) }}</span>
    </div>
    <div class="player__controls">
      <button type="button" class="player__btn player__btn--icon" aria-label="Предыдущий" (click)="onPrev()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button type="button" class="player__btn player__btn--play" (click)="onPlayPause()" [disabled]="loading$ | async" [attr.aria-label]="isPlaying ? 'Пауза' : 'Воспроизведение'">
        <svg *ngIf="!isPlaying" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg *ngIf="isPlaying" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button type="button" class="player__btn player__btn--icon" aria-label="Следующий" (click)="onNext()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>

  <div class="player__right">
    <button type="button" class="player__more" aria-label="Ещё">
      <span class="player__more-dots">⋯</span>
    </button>
  </div>

  <p class="player__error" *ngIf="error$ | async as err">{{ err }}</p>
  <p class="player__loading" *ngIf="loading$ | async">Загрузка…</p>
</div>

<div class="player player--empty" *ngIf="!(currentTrack$ | async)">
  <span class="player__empty-text">Выберите трек из списка</span>
</div>

spring.application.name=musicapp

spring.datasource.url=jdbc:postgresql://localhost:5432/music_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=never

jwt.secret=${JWT_SECRET:musicapp-secret-key-at-least-32-characters-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

app.storage.path=${APP_STORAGE_PATH:./storage}

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
